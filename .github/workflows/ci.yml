name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          frontend/package-lock.json

    - name: Install Root Dependencies
      run: npm ci

    - name: Install Frontend Dependencies
      run: cd frontend && npm ci

    - name: Lint Backend
      run: npm run lint

    - name: Lint Frontend
      run: cd frontend && npm run lint

    - name: Typecheck Backend
      run: npx tsc --noEmit

    - name: Typecheck Frontend
      run: cd frontend && npx tsc --noEmit

    - name: Test Backend & Coverage Gate
      run: npx jest --coverage --coverageThreshold='{"global":{"branches":100,"functions":100,"lines":100,"statements":100}}'

    - name: Test Frontend & Coverage Gate
      run: cd frontend && npx vitest run --coverage

    - name: Build Frontend
      run: cd frontend && npm run build
